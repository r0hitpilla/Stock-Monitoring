services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory_monitor
      POSTGRES_USER: inventory_monitor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  monitor:
    build:
      context: ../backend
    env_file: .env
    command: ["python", "-m", "app.monitor.main"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - playwright_cache:/root/.cache/ms-playwright

  worker:
    build:
      context: ../backend
    env_file: .env
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ../backend
    env_file: .env
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:80"
    profiles: ["self-host"]

volumes:
  postgres_data:
  playwright_cache:
